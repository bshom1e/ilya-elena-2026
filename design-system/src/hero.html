<!-- @dsCard group="Preview" title="Hero" -->
<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hero — превью</title>
<!-- @shared -->
<style>
	body { padding: 0; }
	.hero {
		min-height: 100svh;
		display: flex;
		flex-direction: column;
		align-items: center;
		justify-content: center;
		gap: var(--space-3);
		padding: var(--space-5) var(--space-4);
		text-align: center;
	}
	.hero .eyebrow { color: var(--color-text-muted); }
	.names {
		font-family: var(--font-display);
		font-size: var(--text-display);
		font-weight: 500;
		line-height: 1.05;
		margin: 0;
	}
	.names .amp {
		display: block;
		font-style: italic;
		font-size: 0.45em;
		color: var(--color-accent);
	}
	.date-line {
		display: flex;
		align-items: center;
		gap: var(--space-3);
		color: var(--color-accent-ink);
		font-family: var(--font-display);
		font-style: italic;
		font-size: var(--text-h3);
	}
	.date-line::before, .date-line::after {
		content: '';
		width: 4rem;
		height: 1px;
		background: var(--color-accent);
	}
	.place { margin: 0; color: var(--color-text-muted); font-size: var(--text-caption); letter-spacing: 0.14em; text-transform: uppercase; }
	.scroll-hint {
		margin-top: var(--space-4);
		color: var(--color-accent);
		font-size: var(--text-caption);
		letter-spacing: 0.2em;
	}
</style>
</head>
<body>
	<div class="hero">
		<p class="eyebrow">Приглашение на свадьбу</p>
		<h1 class="names">Илья <span class="amp">&amp;</span> Елена</h1>
		<div class="date-line">6 августа 2026</div>
		<p class="place">База отдыха «Чистые пруды» · Архангельск</p>
		<div class="scroll-hint">↓</div>
	</div>
</body>
</html>
