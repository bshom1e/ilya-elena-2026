<!-- @dsCard group="Components" title="Форма" -->
<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Поля формы</title>
<!-- @shared -->
<style>
	.stack { max-width: 26rem; margin: 0 auto; display: flex; flex-direction: column; gap: var(--space-4); }

	.field { display: flex; flex-direction: column; gap: var(--space-2); }
	.field > label { font-size: var(--text-caption); font-weight: 600; letter-spacing: 0.06em; }

	.input, .textarea {
		width: 100%;
		padding: 0.75em 1em;
		border: 1px solid var(--color-line);
		border-radius: var(--radius);
		background: var(--color-surface);
		color: var(--color-text);
		font-family: var(--font-body);
		font-size: var(--text-base);
		transition: border-color var(--transition), box-shadow var(--transition);
	}
	.input::placeholder, .textarea::placeholder { color: var(--color-text-muted); opacity: 0.7; }
	.input:focus, .textarea:focus, .input.-focus {
		outline: none;
		border-color: var(--color-accent);
		box-shadow: 0 0 0 3px rgba(176, 141, 122, 0.18);
	}
	.textarea { min-height: 6em; resize: vertical; }

	.choice { display: flex; align-items: center; gap: 0.65em; font-size: var(--text-base); cursor: pointer; }
	.choice + .choice { margin-top: var(--space-2); }
	.choice input {
		appearance: none;
		width: 1.25em; height: 1.25em;
		margin: 0;
		border: 1.5px solid var(--color-accent);
		background: var(--color-surface);
		cursor: pointer;
		display: grid; place-content: center;
		transition: background var(--transition);
	}
	.choice input[type="radio"] { border-radius: 50%; }
	.choice input[type="checkbox"] { border-radius: 0.2em; }
	.choice input::before { content: ''; width: 0.55em; height: 0.55em; transform: scale(0); transition: transform var(--transition); background: var(--color-accent-ink); }
	.choice input[type="radio"]::before { border-radius: 50%; }
	.choice input:checked { border-color: var(--color-accent-ink); }
	.choice input:checked::before { transform: scale(1); }
	.choice input:focus-visible { outline: 2px solid var(--color-accent-ink); outline-offset: 2px; }
</style>
</head>
<body>
	<div class="stack">
		<div class="field">
			<label for="name">Ваше имя</label>
			<input class="input" id="name" type="text" placeholder="Имя и фамилия" />
		</div>
		<div class="field">
			<label for="name2">Поле в фокусе</label>
			<input class="input -focus" id="name2" type="text" value="Анна Ковалёва" />
		</div>
		<div class="field">
			<label>Придёте?</label>
			<div>
				<label class="choice"><input type="radio" name="rsvp" checked /> С радостью приду</label>
				<label class="choice"><input type="radio" name="rsvp" /> К сожалению, не смогу</label>
			</div>
		</div>
		<div class="field">
			<label>Предпочтения по напиткам</label>
			<div>
				<label class="choice"><input type="checkbox" checked /> Красное вино</label>
				<label class="choice"><input type="checkbox" checked /> Шампанское</label>
				<label class="choice"><input type="checkbox" /> Крепкие напитки</label>
			</div>
		</div>
		<div class="field">
			<label for="msg">Пожелание молодожёнам</label>
			<textarea class="textarea" id="msg" placeholder="Пара тёплых слов…"></textarea>
		</div>
	</div>
</body>
</html>
